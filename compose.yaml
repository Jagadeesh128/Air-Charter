services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony_app
    user: "1000:1000"
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:80"
    depends_on:
      - database
    environment:
      HOME: /home/dev   # ✅ fixes VS Code issue
      DATABASE_URL: "mysql://symfonyuser:symfony_password@symfony_db:3306/air_charter_db?serverVersion=8.0"

  database:
    image: mysql:8.0
    container_name: symfony_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: air_charter_db
      MYSQL_USER: symfonyuser
      MYSQL_PASSWORD: symfony_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: